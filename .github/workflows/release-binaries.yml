name: Release Binaries

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: linux-x64
            os: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            target: linux-arm64
            os: linux
            arch: arm64
          - runner: windows-2025
            target: windows-x64
            os: windows
            arch: x64
          - runner: windows-11-arm
            target: windows-arm64
            os: windows
            arch: arm64
          - runner: macos-15-intel
            target: macos-x64
            os: macos
            arch: x64
          - runner: macos-15
            target: macos-arm64
            os: macos
            arch: arm64

    env:
      APP_NAME: web3d
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      RELEASE_TAG: ${{ github.ref_name }}
      TARGET_ID: ${{ matrix.target }}
      TARGET_OS: ${{ matrix.os }}
      TARGET_ARCH: ${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js standalone bundle
        run: npm run build

      - name: Build executable bundle
        run: npm run build:sea

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/release/*
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/release/*
